<!--
  Somerset Language Centre — COLOUR wordmark SVG (green on white/light backgrounds)
  Fixed 4 Jun 2026: widened viewBox, LANGUAGE CENTRE repositioned to clear "Somerset"
  Use: HTML worksheets on white backgrounds, inline <img> or embedded SVG
-->
<svg viewBox="0 0 430 56" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Somerset Language Centre">
  <!-- Somerset wordmark — green -->
  <text
    x="0" y="46"
    font-family="'Arial Black', 'Arial', sans-serif"
    font-weight="800"
    font-size="50"
    fill="#6BAE2E"
    letter-spacing="-1"
  >Somerset</text>
  <!-- LANGUAGE CENTRE stack — positioned clear of wordmark -->
  <text
    x="272" y="25"
    font-family="Arial, Helvetica, sans-serif"
    font-weight="700"
    font-size="11.5"
    fill="#1A1A1A"
    letter-spacing="2.5"
  >LANGUAGE</text>
  <text
    x="272" y="43"
    font-family="Arial, Helvetica, sans-serif"
    font-weight="700"
    font-size="11.5"
    fill="#1A1A1A"
    letter-spacing="2.5"
  >CENTRE</text>
</svg>
